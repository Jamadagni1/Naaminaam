<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naamin | Name Details</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </noscript>

  <link rel="stylesheet" href="style.css?v=ui-20260519-script-fit" />
  <script src="js/common-layout.js?v=footer-static-social-20260516a" defer></script>
  <script src="js/global-language-fab.js?v=langfab-20260519c" defer></script>
  <script src="script.js?v=perf-20260516-translate-fix" defer></script>
  <script src="js/name-details.js?v=details-20260506a" defer></script>

  <style>
    .name-shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 96px 16px 52px;
    }

    .name-head {
      border-radius: 22px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 27, 46, 0.12);
      box-shadow: 0 10px 24px rgba(31, 27, 46, 0.06);
      display: grid;
      gap: 12px;
    }

    .name-title {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .name-title h1 {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(34px, 5vw, 54px);
      letter-spacing: -0.03em;
      line-height: 1.0;
    }

    .name-sub {
      margin: 0;
      color: var(--text-medium);
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(31, 27, 46, 0.12);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text-dark);
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.2px;
    }

    .name-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    .btn-pill {
      border: 1px solid rgba(31, 27, 46, 0.12);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text-dark);
      border-radius: 999px;
      padding: 10px 13px;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: 0.2px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-pill.primary {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.95), rgba(168, 85, 247, 0.95));
      border-color: rgba(108, 43, 217, 0.18);
      color: #fff;
    }

    .btn-pill.danger.active {
      background: rgba(239, 68, 68, 0.25);
      border-color: rgba(239, 68, 68, 0.4);
    }

    .meaning-card {
      margin-top: 14px;
      border-radius: 22px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 27, 46, 0.12);
    }

    .meaning-card h2 {
      margin: 0 0 8px;
      font-size: 16px;
      letter-spacing: -0.01em;
    }

    .meaning-card p {
      margin: 0;
      color: var(--text-medium);
      line-height: 1.55;
    }

    .similar {
      margin-top: 16px;
      border-radius: 22px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 27, 46, 0.12);
    }

    .similar h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .similar-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .similar-item {
      border-radius: 18px;
      padding: 12px 12px 10px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 27, 46, 0.12);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .similar-item strong {
      color: var(--text-dark);
      letter-spacing: -0.01em;
    }

    .similar-item a {
      color: inherit;
      text-decoration: none;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .explorer-heart {
      border: 1px solid rgba(31, 27, 46, 0.12);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text-dark);
      border-radius: 999px;
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .explorer-heart.active {
      background: rgba(239, 68, 68, 0.25);
      border-color: rgba(239, 68, 68, 0.4);
    }

    @media (max-width: 860px) {
      .similar-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .name-shell {
        padding-top: 78px;
      }

      .similar-grid {
        grid-template-columns: 1fr;
      }

      .name-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body class="name-page">
  <nav class="navbar"></nav>

  <main class="name-shell">
    <section class="name-head">
      <div class="name-title">
        <div>
          <h1 id="name-title" class="notranslate" translate="no" lang="en">Name</h1>
          <p class="name-sub">
            <span class="pill" id="name-hi">नाम</span>
            <span class="pill" id="name-gender">—</span>
          </p>
        </div>

        <div class="name-actions">
          <button id="fav-btn" class="btn-pill danger" type="button" data-en="Save" data-hi="सेव करें">
            <i class="far fa-heart"></i> <span data-en="Save" data-hi="सेव करें">Save</span>
          </button>
          <button id="copy-btn" class="btn-pill" type="button" data-en="Copy link" data-hi="लिंक कॉपी">
            <i class="fas fa-link"></i> <span data-en="Copy link" data-hi="लिंक कॉपी">Copy link</span>
          </button>
          <a class="btn-pill primary" href="name-report.html" data-en="Get Name Report" data-hi="नाम रिपोर्ट लें">
            <i class="fas fa-file-lines"></i> <span data-en="Get Name Report" data-hi="नाम रिपोर्ट लें">Get Name Report</span>
          </a>
        </div>
      </div>
    </section>

    <section class="meaning-card">
      <h2 data-en="Meaning" data-hi="अर्थ">Meaning</h2>
      <p id="name-meaning">—</p>
    </section>

    <section class="similar">
      <h2 data-en="Similar Names" data-hi="मिलते-जुलते नाम">Similar Names</h2>
      <div class="similar-grid" id="similar-grid"></div>
    </section>
  </main>

  <footer></footer>

  <a href="https://wa.me/9413678955?text=Hello" class="whatsapp-float" target="_blank" rel="noopener">
    <i class="fa-brands fa-whatsapp whatsapp-icon"></i>
  </a>
  <button id="scrollToTopBtn" class="scroll-to-top-btn" aria-label="Scroll to top"><i class="fas fa-arrow-up"></i></button>
</body>

</html>
